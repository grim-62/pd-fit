<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-gap">
<div class="w-full max-w-md">
<!-- Branding/Welcome Section -->
<div class="text-center mb-stack-lg">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container mb-stack-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="exercise">exercise</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Start your high-performance fitness journey with Pulse Fitness today.</p>
</div>
<!-- Registration Form Card -->
<div class="bg-surface-container-lowest p-8 rounded-[2rem] border border-outline-variant/30 shadow-sm shadow-slate-200/50">
<form class="space-y-stack-md">
<!-- Name Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="name">FULL NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-md transition-all duration-200 outline-none placeholder:text-outline/50" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-md transition-all duration-200 outline-none placeholder:text-outline/50" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-md transition-all duration-200 outline-none placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="confirm-password">CONFIRM PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock_reset">lock_reset</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-md transition-all duration-200 outline-none placeholder:text-outline/50" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start space-x-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="terms" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-h3 text-h3 py-4 rounded-xl shadow-md shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-stack-md" type="submit">
                        Get Started
                    </button>
</form>
<!-- Social Sign Up -->
<div class="mt-8">
<div class="relative flex items-center mb-6">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-md text-label-md text-outline">OR REGISTER WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center py-3 px-4 border border-outline-variant rounded-xl font-label-md text-on-surface hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
<img alt="Google Logo" class="w-5 h-5 mr-3" data-alt="Official Google G logo in brand colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD56Gbe6YrOdNYQyoAE930nHzT31x5IKLiBD8upD0AqXgyjX_gwldCKnDgAat75haIW5PuGT22b2cV-V7FfoHqlqvqWO3A_niYLOcbSN7WEZ4cvyA1hGlD2z9gEB1UNOXQystZ8zYPNlJuXrKG3v7eQzCQESJxUYsXMe7tEkRLHgfMU7L2XzlYiZRCyJEPiR3EpcSK-j-zDnWaVn6NOMnM3Hf7ZObI4ZceflgZxcmwGEDylbPf6TzEaU0XWI7ouOM6i3QJyRthbclQw"/>
                            GOOGLE
                        </button>
<button class="flex items-center justify-center py-3 px-4 border border-outline-variant rounded-xl font-label-md text-on-surface hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-xl mr-3 text-[#1877F2]" data-icon="facebook" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
                            FACEBOOK
                        </button>
</div>
</div>
</div>
<!-- Login Link -->
<p class="text-center mt-8 font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
</div>

<!-- Visual Accent Element (Subtle Background Detail) -->
<div class="fixed top-0 right-0 -z-10 opacity-10">
<img alt="Fitness Aesthetic" class="w-[600px] h-[600px] object-cover rounded-full translate-x-1/2 -translate-y-1/3 blur-3xl" data-alt="abstract artistic background showing a silhouetted person exercising in a dimly lit high-end gym with blue atmospheric lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYF8HAhgkwMNrrGjmkRVmW55JBC_G7mX3x1ZD31aSqWvFnY5jEzdakkWO7bg_tCgqNHrhWIhQzbGIILW-PCiZbFmYcsNPnxHuX4NhI8ywmoE9F0tPVkwvfSKB5DqjavXH7WNB1204crI1dXngPTdMvFZV_Tx3XosbZ-IrtUKrv8qmDAjRAw9QJttn2K7uGxNA99Z-WzpyTWY2sKux1-LKP9S8FiR2bO6PqTnypN1uTjg7P103HDn--nIXUPavnWrkSkLbcWMNXbN19"/>
</div>

<p class="font-label-sm text-label-sm text-outline tracking-widest uppercase">Precision Health • Data Driven • Pulse Fitness</p>
